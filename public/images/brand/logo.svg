  <g fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer spiral curve -->
    <path d="M 100 55 Q 125 55, 140 75 Q 152 92, 145 115 Q 138 135, 115 142 Q 90 148, 75 135 Q 62 125, 62 105 Q 62 85, 80 78 Q 100 72, 112 88 Q 122 100, 115 118 Q 108 130, 95 133"/>
