<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-spiral { 
        stroke-linecap: round; 
        stroke-linejoin: round;
        transition: stroke 0.3s ease;
      }
    </style>
  </defs>

  <!-- Black Circle Background -->
  <circle cx="100" cy="100" r="98" fill="#1A1A1A" stroke="none"/>
  
  <!-- Premium Gradient Definition (optional shimmer) -->
  <defs>
    <radialGradient id="spiralGlow" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:white;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- White Spiral - Professional Design -->
  <g fill="none" stroke="url(#spiralGlow)" stroke-width="3" class="logo-spiral">
    <!-- Clean, mathematical spiral -->
    <path d="M 100 40 Q 130 45, 145 65 Q 158 85, 155 110 Q 152 135, 130 150 Q 105 162, 80 155 Q 60 150, 55 130 Q 50 105, 65 95 Q 82 87, 95 100 Q 105 110, 100 125 Q 92 138, 78 140 Q 68 141, 65 130" 
          stroke-width="3.2" opacity="0.95"/>
  </g>

  <!-- Center Circle Accent - Premium Touch -->
  <circle cx="100" cy="100" r="3.5" fill="white" opacity="0.9"/>
  
  <!-- Optional: Subtle outer ring for depth -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="white" stroke-width="0.8" opacity="0.15"/>
</svg>
